<!DOCTYPE html>
<html>
<head>
<title>YouTube AI翻译</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

input{
width:60%;
padding:10px;
}

button{
padding:10px 20px;
}

</style>

</head>

<body>

<h1>YouTube AI翻译工具</h1>

<input id="url" placeholder="粘贴YouTube视频链接">

<br><br>

<button onclick="run()">开始翻译</button>

<pre id="result"></pre>

<script>

async function run(){

let url=document.getElementById("url").value

let id=url.split("v=")[1]

let api="https://你的worker地址/?url="+id

let r=await fetch(api)

let t=await r.text()

document.getElementById("result").innerText=t

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>YouTube 视频翻译</title>
<style>
body{
font-family:Arial;
text-align:center;
margin-top:40px;
}
input{
width:60%;
padding:10px;
}
button{
padding:10px 20px;
}
</style>
</head>

<body>

<h1>YouTube 自动翻译</h1>

<input id="url" placeholder="粘贴YouTube视频链接">

<br><br>

<button onclick="translate()">翻译视频</button>

<div id="player"></div>

<script>

function translate(){

let url=document.getElementById("url").value

let id=url.split("v=")[1]

document.getElementById("player").innerHTML=
`<iframe width="700" height="400"
src="https://www.youtube.com/embed/${id}?cc_lang_pref=zh&cc_load_policy=1"
frameborder="0" allowfullscreen></iframe>`

}

</script>

</body>
</html>
